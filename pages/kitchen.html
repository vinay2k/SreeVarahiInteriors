/* Gallery */

.gallery-container{

margin:50px auto;

}



.gallery{

display:flex;

gap:25px;

overflow-x:auto;

scroll-behavior:smooth;

}



.gallery img{

width:300px;

height:220px;

object-fit:cover;

border-radius:15px;

cursor:pointer;

transition:.4s;

}



.gallery img:hover{

transform:scale(1.05);

}



/* Popup */


.popup-overlay{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.85);

display:none;

justify-content:center;

align-items:center;

z-index:999;


}


.popup-overlay.active{

display:flex;

}



.popup-overlay img{

max-width:80%;

max-height:80%;

border-radius:15px;

}



.arrow{

position:absolute;

font-size:50px;

color:white;

cursor:pointer;

}



.left{

left:40px;

}



.right{

right:40px;

}
